<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="./bundle.js" defer></script>
    <title>Maintenance Tracker App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Maintenance Tracker</h1>

    <main class="layout">
      <aside class="form-panel">
        <form id="form">
          <h2>Add / Edit Task</h2>

          <input id="machine-id" placeholder="Machine Id" />

          <input id="task-title" placeholder="Task" />

          <select id="type" name="type">
            <option value="service">Service</option>
            <option value="major repair">Major repair</option>
            <option value="breakdown">Breakdown</option>
          </select>

          <select id="status" name="status">
            <option value="open">Open</option>
            <option value="in-progress">In Progress</option>
            <option value="done">Done</option>
          </select>

          <select id="priority" name="priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>

          <textarea id="notes" placeholder="Notes"></textarea>

          <div class="form-actions">
            <input id="submit-btn" type="submit" value="Add Task" />
            <button type="button" id="cancel-btn" hidden>Cancel Edit</button>
          </div>
        </form>
      </aside>

      <section class="tasks-panel">
        <h2>Tasks</h2>
        <ul id="task-list"></ul>
      </section>
    </main>
  </body>
</html>
